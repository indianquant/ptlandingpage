<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Mansi Varshney</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;
background:linear-gradient(180deg,#f8fafc,#eef2f7);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
color:#333;
padding:20px;
}

/* fade animation */

@keyframes fadeIn {
0% {opacity:0; transform:translateY(20px);}
100% {opacity:1; transform:translateY(0);}
}

.card{
max-width:420px;
width:100%;
animation:fadeIn 1.4s ease;
}

.icon{
width:60px;
height:60px;
margin:auto;
opacity:.8;
margin-bottom:20px;
}

h1{
font-size:28px;
margin:0;
}

.subtitle{
font-size:16px;
color:#6b7280;
margin-top:6px;
}

.tagline{
font-size:22px;
margin:40px 0 25px;
font-weight:300;
line-height:1.4;
}

.line{
width:50px;
height:2px;
background:#d1d5db;
margin:20px auto;
}

.note{
font-size:15px;
color:#6b7280;
}

.footer{
margin-top:40px;
font-size:13px;
color:#9ca3af;
}

</style>
</head>

<body>

<div class="card">

<div class="icon">

<svg viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="1.5">
<path d="M4 14s2-2 4-2 4 2 6 2 4-2 6-2"/>
<path d="M4 18s2-2 4-2 4 2 6 2 4-2 6-2"/>
<circle cx="12" cy="6" r="2"/>
</svg>

</div>

<h1>Dr. Mansi Varshney</h1>
<div class="subtitle">BPT, MPT (Ortho)</div>

<div class="line"></div>

<div class="tagline">
Healing through movement and care.
</div>

<div class="line"></div>

<p class="note">
This space is being prepared for the work and lives you will change.
</p>

<div class="footer">
A small place on the internet saved for Dr. Mansi Varshney.
</div>

</div>

</body>
</html>
