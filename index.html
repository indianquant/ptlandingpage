<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Mansi Varshney</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(180deg, #f8fafc, #eef2f7);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            color: #333;
            padding: 20px;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .card {
            max-width: 420px;
            width: 100%;
            animation: fadeIn 1.4s ease;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            position: relative;
        }

        .icon {
            width: 60px;
            height: 60px;
            margin: auto;
            opacity: .8;
            margin-bottom: 20px;
        }

        h1 { font-size: 28px; margin: 0; color: #1f2937; }
        .subtitle { font-size: 16px; color: #6b7280; margin-top: 6px; }
        .line { width: 40px; height: 2px; background: #d1d5db; margin: 20px auto; }
        .tagline { font-size: 20px; margin: 20px 0; font-weight: 300; line-height: 1.4; color: #4b5563; }

        /* Review Slider Styles */
        .review-section {
            min-height: 160px; /* Prevents card jumping when text length changes */
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin: 20px 0;
        }

        #review-display {
            transition: opacity 0.8s ease-in-out;
            opacity: 1;
        }

        .review-card { text-align: center; }
        .stars { color: #fbbf24; font-size: 14px; margin-bottom: 8px; }
        .reviewer-name { display: block; font-weight: 600; color: #374151; margin-bottom: 6px; font-size: 14px; }
        .review-text { color: #6b7280; line-height: 1.5; font-style: italic; font-size: 15px; }
        .keyword-highlight { color: #1f2937; font-weight: 600; }

        .note { font-size: 14px; color: #9ca3af; margin-top: 30px; }
        .footer { margin-top: 20px; font-size: 11px; color: #cbd5e1; letter-spacing: 0.5px; }
    </style>
</head>

<body>

<div class="card">
    <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="1.5">
            <path d="M4 14s2-2 4-2 4 2 6 2 4-2 6-2"/><path d="M4 18s2-2 4-2 4 2 6 2 4-2 6-2"/><circle cx="12" cy="6" r="2"/>
        </svg>
    </div>

    <h1>Dr. Mansi Varshney</h1>
    <div class="subtitle">BPT, MPT (Ortho)</div>
    <div class="line"></div>
    <div class="tagline">Healing through movement and care.</div>
    <div class="line"></div>

    <div class="review-section">
        <div id="review-display">
            <div class="stars">★★★★★</div>
            <div id="review-content">
                <span class="reviewer-name" id="rev-name">Loading experiences...</span>
                <div class="review-text" id="rev-text"></div>
            </div>
        </div>
    </div>

    <p class="note">Creating a space for health and recovery.</p>
    <div class="footer">DR. MANSI VARSHNEY • PORTFOLIO 2026</div>
</div>

<script>
    const reviews = [
    { name: "Akshay Sharma", text: "The experience was exceptional... Senior physical therapists—Dr. Wasim, Faraz, Mansi, and Rohit demonstrate extensive knowledge." },
    { name: "pankhuri bahadur", text: "Special thanks to Mansi who takes care of my requirements. It is a professional centre with adequate equipments." },
    { name: "Ankur Bansal", text: "A special thanks and heartfelt appreciation to my treating doctor, Dr. Mansi. She is a thorough professional and has been instrumental in relief from pain." },
    { name: "Mouli Jain", text: "I was treated by Dr Mansi and because of her efforts I am much better now. Everyone should visit this centre." },
    { name: "Seema Ji", text: "I especially want to thank Dr. Mansi Vishal for taking such good care of me and helping me with my leg and ankle pain." },
    { name: "Sulagna Dasgupta", text: "I would also like to make a special mention of Mansi who attends me everyday - she is very sincere, caring young physiotherapist." },
    { name: "Neelam Chetwani", text: "The treatment was very good. I have knee issue and got instant relief... I was treated by Dr. Mansi." },
    { name: "Shalini Roy", text: "Special thanks to Ruchi and Mansi, who are always there to listen to your problems with a big smile and has so much positivity." },
    { name: "Lucy Gabriel Chattopadhyay", text: "The staff was welcoming, and Physiotherapist's... Mansi, took the time to understand my concerns and explain the treatment plan." },
    { name: "Rahul Kumar", text: "I had heavy neck pain and it got very minimal in just 3 days... Thank you ruchi mam, mansi, wasim." },
    { name: "Sarika Sharma", text: "Specially Dr Mansi always attend n do her work with full heart. KEEP IT UP!" },
    { name: "Sunita Kumari", text: "Also Dr.Kirtika, Dr. Mansi and Dr.Farhaz are awesome and has been helping me with my session. My pain is almost gone." },
    { name: "Ira Singh", text: "My problem is a long standing one yet I have benefited enormously... Dr Faraz, Dr Mansi, Dr parul are all extremely well trained." },
    { name: "Kavita Singh Advocate", text: "Dr. Ruchi & Dr. Mansi are very dedicated & knowledgeable... result by reducing my cervical hump & pain in 10 sittings." },
    { name: "Madhavika Choudhury", text: "Excellent diagnosis and treatment by very competent and credible therapists especially Dr. Kritika, Dr. Satvika and Dr. Mansi." },
    { name: "Tanmay", text: "All staff are very attentive specially Dr. Mansi and Kritika. Ultimate experience." },
    { name: "Prema Rajagopalan", text: "Best physiotherapist team... Mansi and Anjali who attended in me made me too happy. I am walking now independently." },
    { name: "Sushma Oli", text: "Great service. Mansi does an excellent job. She is very sincere and takes good care of the patients." },
    { name: "Hritambara Rajawat", text: "The staff was very help full... dr Wasim, dr Mansi and dr rohit their treatment was superb." },
    { name: "Mudita Gupta", text: "Dr Ruchi and Dr Mansi gave me a very relieving session... my pain subsided considerably after their hard work." },
    { name: "Vasumana Punj", text: "Ms. Mansi, specialist in the clinic does the therapy very well and helps improve stiffness." },
    { name: "Arnav Jain", text: "The doctors really helped me to reduce pain... Mansi Ma’am and Waseem Sir were very helpful." },
    { name: "Preeti MV", text: "Dr Mansi attended me and has knowledge about my problem and explained it to me as well." },
    { name: "Aakar Book", text: "Well experienced, trained and dedicated team and Ms Mansi is exceptional." },
    { name: "S M", text: "Specially Mansi gives an extremely good therapy. 😊" },
    { name: "Himanshu Rajput", text: "Dr Mansi is the best doctor she is treated me and guided me well." }
];

    let currentIndex = 0;
    const displayElement = document.getElementById('review-display');
    const nameElement = document.getElementById('rev-name');
    const textElement = document.getElementById('rev-text');

    function updateReview() {
        // Fade out
        displayElement.style.opacity = 0;

        setTimeout(() => {
            const review = reviews[currentIndex];
            nameElement.textContent = review.name;
            
            // Highlight Mansi
            const highlighted = review.text.replace(/Mansi/gi, (match) => `<span class="keyword-highlight">${match}</span>`);
            textElement.innerHTML = `"${highlighted}"`;

            // Fade in
            displayElement.style.opacity = 1;
            
            // Move to next or restart
            currentIndex = (currentIndex + 1) % reviews.length;
        }, 800); // This delay matches the CSS transition
    }

    // Shuffle reviews on refresh so it's different every time
    reviews.sort(() => Math.random() - 0.5);

    // Initial call and interval
    updateReview();
    setInterval(updateReview, 3000); // Changes every 8 seconds
</script>

</body>
</html>
